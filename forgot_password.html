{% extends "layout.html" %}

{% block title %}Password dimenticata{% endblock %}

{% block content %}

<div style="
    background:#0b0e14;
    padding:80px 20px;
    display:flex;
    justify-content:center;
">

    <div style="
        background:#121826;
        border:1px solid #22304a;
        border-radius:14px;
        padding:40px;
        width:100%;
        max-width:400px;
    ">

        <h2 style="text-align:center; margin-bottom:15px;">
            Recupera password
        </h2>

        <p style="
            text-align:center;
            color:#9aa3b2;
            font-size:14px;
            line-height:1.5;
            margin-bottom:25px;
        ">
            Inserisci l'email associata al tuo account. Se l'indirizzo è registrato,
            riceverai un link per reimpostare la password.
        </p>

        <form method="POST" action="{{ url_for('forgot_password') }}">

            <input type="email" name="email" placeholder="Email"
                style="
                    width:100%;
                    padding:12px;
                    margin-bottom:20px;
                    border-radius:8px;
                    border:none;
                " required>

            <button type="submit" class="btn primary" style="width:100%;">
                Invia link di reset
            </button>

        </form>

    </div>

</div>

{% endblock %}
