{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<!-- HERO (immagine ottimizzata per full screen) -->
<div style="
    height: 100vh;
    background-image: url('{{ url_for('static', filename='images/hero.jpg') }}');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    position: relative;
">


    <!-- canvas animazione -->
    <canvas id="mc-lines" style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:2;
        display:block;
        pointer-events:none;
    "></canvas>
    
    <!-- overlay scuro -->
    <div style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.65);
        z-index:1;
    "></div>

    <!-- contenuto -->
    <div style="
        position:absolute;
        left:80px;
        top:120px;
        z-index:3;
        text-align:left;
        color:white;
    ">
        <div style="
            background: rgba(0,0,0,0.55);
            padding:20px 24px;
            border-radius:10px;
            max-width:420px;
        ">
            <h1 style="font-size:34px;">SPACE-T Trading System</h1>
            <p>Automazione e segnali intelligenti per trader avanzati</p>

            <br>

            <a href="#">
                <button onclick="openRegister()">Inizia ora</button>
            </a>
            
            <button onclick="openLogin()">Login</button>

            </button>
        </div>
    </div>

</div>


<!-- SEZIONE SOTTO (immagine intera NON tagliata) -->
<div style="
    background:black;
    padding:60px 20px;
    text-align:center;
">

    <img src="{{ url_for('static', filename='images/hero.jpg') }}" 
         style="
            width:100%;
            max-width:1200px;
            border-radius:10px;
         ">

</div>

{% endblock %}
