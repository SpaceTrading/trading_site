{% extends "layout.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div style="
    background:#0b0e14;
    padding:80px 20px;
    display:flex;
    justify-content:center;
">

    <div style="
        background:#121826;
        border:1px solid #22304a;
        border-radius:14px;
        padding:40px;
        width:100%;
        max-width:400px;
    ">

        <h2 style="text-align:center; margin-bottom:30px;">
            Nuova Password
        </h2>

        <form method="POST">

            <input type="password" name="password" placeholder="Nuova Password"
                style="
                    width:100%;
                    padding:12px;
                    margin-bottom:15px;
                    border-radius:8px;
                    border:none;
                " required>

            <input type="password" name="password2" placeholder="Conferma Password"
                style="
                    width:100%;
                    padding:12px;
                    margin-bottom:20px;
                    border-radius:8px;
                    border:none;
                " required>

            <button type="submit" class="btn primary" style="width:100%;">
                Aggiorna Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
