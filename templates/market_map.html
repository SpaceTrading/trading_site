{% extends "layout.html" %}

{% block content %}

<style>
#3d-graph {
  position: relative;
  z-index: 999999 !important;
}
</style>

<div style="height:100vh; background:black;">
  <div id="3d-graph"></div>
</div>

<!-- PANNELLO DATI -->
<div id="companyPanel" onclick="event.stopPropagation()" style="
  position:fixed;
  top:80px;
  right:20px;
  width:320px;
  max-height:80vh;
  overflow-y:auto;
  background:rgba(10,15,30,0.95);
  border:1px solid rgba(0,200,255,0.3);
  border-radius:12px;
  padding:20px;
  color:white;
  display:none;
  z-index:99999;
">

  <div style="
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
  " onclick="closePanel()">✖</div>

  <div id="panelContent"></div>

</div>

<script src="https://unpkg.com/3d-force-graph"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
let selectedNode = null;
let graphData = null;

fetch("/api/market-map")
  .then(res => res.json())
  .then(data => {

    graphData = data;

    const sectorColors = {
      Tech: "#00d4ff",
      Finance: "#a855f7",
      Healthcare: "#3b82f6",
      Industrials: "#f59e0b",
      Energy: "#ef4444",
      Materials: "#84cc16",
      ConsumerDiscretionary: "#f97316",
      ConsumerStaples: "#22c55e",
      Communication: "#e879f9",
      RealEstate: "#64748b",
      Utilities: "#0ea5e9"
    };

    window.Graph = ForceGraph3D()(document.getElementById('3d-graph'))
      .graphData(graphData)

      .nodeColor(node => {
        if (selectedNode && node.id === selectedNode.id) return "#ffffff";
        return sectorColors[node.sector] || "#888";
      })

      .nodeLabel(node => `
        <b>${node.label || node.id}</b><br>
        Settore: ${node.sector}<br>
        Market Cap: ${formatCap(node.market_cap)}
      `)

      .nodeVal(node => Math.sqrt(node.market_cap || 1))

      .onNodeClick(node => {
        selectedNode = node;
        console.log("CLICK:", node);
        openPanel(node);
        window.Graph.refresh();
      })

      .backgroundColor('#000');

    window.Graph.d3Force('charge').strength(-120);
    window.Graph.d3Force('link').distance(120);
    window.Graph.d3Force(
      'collision',
      d3.forceCollide(node => Math.sqrt(node.market_cap || 1) * 2)
    );

    window.Graph.zoomToFit(1000);
  });

/* =========================
   PANEL FUNCTIONS
========================= */

function openPanel(node) {
  const panel = document.getElementById("companyPanel");
  const content = document.getElementById("panelContent");

  const analytics = getAnalytics(node.id);

  const incoming = graphData.links.filter(l => {
    const target = typeof l.target === "object" ? l.target.id : l.target;
    return target === node.id;
  });

  const outgoing = graphData.links.filter(l => {
    const source = typeof l.source === "object" ? l.source.id : l.source;
    return source === node.id;
  });

  content.innerHTML = `
    <h2>${node.label || node.id}</h2>
    <div style="color:#00d4ff;">${node.sector}</div>

    <br>
    <b>Market Cap:</b> ${formatCap(node.market_cap)}<br>
    <b>Influence:</b> ${analytics.influenceScore}<br>
    <b>Connessioni:</b> ${analytics.connectedCount}

    <hr>

    <b>Chi investe:</b>
    ${incoming.length ? incoming.map(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      return `<div>${s} → ${l.value}%</div>`;
    }).join("") : "<div>Nessuno</div>"}

    <hr>

    <b>Dove investe:</b>
    ${outgoing.length ? outgoing.map(l => {
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return `<div>${t} ← ${l.value}%</div>`;
    }).join("") : "<div>Nessuno</div>"}
  `;

  panel.style.display = "block";
}

function closePanel() {
  selectedNode = null;
  document.getElementById("companyPanel").style.display = "none";
  if (window.Graph) window.Graph.refresh();
}

function formatCap(value) {
  if (!value) return "N/D";
  if (value >= 1000) return (value / 1000).toFixed(2) + "T";
  return value.toFixed(2) + "B";
}

function getAnalytics(nodeId) {
  const incoming = graphData.links.filter(l => {
    const t = typeof l.target === "object" ? l.target.id : l.target;
    return t === nodeId;
  });

  const outgoing = graphData.links.filter(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    return s === nodeId;
  });

  const connected = new Set();

  incoming.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    connected.add(s);
  });

  outgoing.forEach(l => {
    const t = typeof l.target === "object" ? l.target.id : l.target;
    connected.add(t);
  });

  return {
    connectedCount: connected.size,
    influenceScore: (outgoing.length * 2 + incoming.length + connected.size * 0.5).toFixed(2)
  };
}

window.addEventListener("click", function(e) {
  const panel = document.getElementById("companyPanel");
  if (panel.contains(e.target)) return;
  closePanel();
});
</script>

{% endblock %}
